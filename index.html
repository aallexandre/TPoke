<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070b12">
  <meta name="description" content="Ferramenta premium para analise Pokemon.">
  <title>Kelde.io</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="mobile-command-center">
      <button id="mobile-search-toggle" class="mobile-search-toggle" type="button" aria-expanded="false" aria-controls="quick-actions-panel">
        <span class="mobile-search-label">Buscar Pokemon, tipos ou time</span>
        <span class="mobile-search-icon" aria-hidden="true">Go</span>
      </button>
    </div>

    <header class="app-header">
      <div>
        <span class="app-kicker">Pokemon battle tool</span>
        <h1>Kelde.io</h1>
      </div>
      <button id="team-open-button" class="team-open-button" type="button">Meu Time</button>
    </header>

    <section id="quick-actions-panel" class="calculator" aria-label="Calculadora de fraqueza Pokemon">
      <div class="mobile-panel-heading">
        <span>Acoes rapidas</span>
        <button id="mobile-panel-close" class="mobile-panel-close" type="button" aria-label="Fechar painel">x</button>
      </div>

      <div class="search-field">
        <label for="pokemon-search">Nome do Pokémon</label>
        <input id="pokemon-search" type="search" placeholder="Ex: pikachu">
        <div id="pokemon-suggestions" class="suggestions" role="listbox"></div>
      </div>

      <button id="search-button" class="secondary-button" type="button">Buscar Pokémon</button>

      <div class="field">
        <label for="type-one">Tipo 1</label>
        <select id="type-one">
          <option value="">Escolha um tipo</option>
          <option value="normal">Normal</option>
          <option value="fire">Fogo</option>
          <option value="water">Agua</option>
          <option value="grass">Grama</option>
          <option value="electric">Eletrico</option>
          <option value="ice">Gelo</option>
          <option value="fighting">Lutador</option>
          <option value="poison">Venenoso</option>
          <option value="ground">Terra</option>
          <option value="flying">Voador</option>
          <option value="psychic">Psiquico</option>
          <option value="bug">Inseto</option>
          <option value="rock">Pedra</option>
          <option value="ghost">Fantasma</option>
          <option value="dragon">Dragao</option>
          <option value="dark">Sombrio</option>
          <option value="steel">Aco</option>
          <option value="fairy">Fada</option>
        </select>
      </div>

      <div class="field">
        <label for="type-two">Tipo 2</label>
        <select id="type-two">
          <option value="">Nenhum</option>
          <option value="normal">Normal</option>
          <option value="fire">Fogo</option>
          <option value="water">Agua</option>
          <option value="grass">Grama</option>
          <option value="electric">Eletrico</option>
          <option value="ice">Gelo</option>
          <option value="fighting">Lutador</option>
          <option value="poison">Venenoso</option>
          <option value="ground">Terra</option>
          <option value="flying">Voador</option>
          <option value="psychic">Psiquico</option>
          <option value="bug">Inseto</option>
          <option value="rock">Pedra</option>
          <option value="ghost">Fantasma</option>
          <option value="dragon">Dragao</option>
          <option value="dark">Sombrio</option>
          <option value="steel">Aco</option>
          <option value="fairy">Fada</option>
        </select>
      </div>

      <button id="calculate-button" type="button">Calcular</button>
      <button id="show-type-pokemon-button" class="secondary-button" type="button">Mostrar Pokémon com essa tipagem</button>
      <button id="mobile-team-button" class="secondary-button mobile-team-button" type="button">Acessar Meu Time</button>
    </section>

    <section id="result" class="result" aria-live="polite"></section>
  </main>

  <aside id="team-panel" class="team-panel" aria-label="Meu Time" aria-hidden="true">
    <div class="team-panel-content">
      <div class="team-panel-header">
        <h2>Meu Time</h2>
        <button id="team-close-button" class="icon-text-button" type="button">Fechar</button>
      </div>

      <div id="team-tabs" class="team-tabs" aria-label="Times salvos"></div>

      <label class="team-name-field" for="team-name-input">Nome do time</label>
      <input id="team-name-input" type="text" maxlength="32">

      <div class="team-search-field">
        <label for="team-pokemon-search">Adicionar Pokémon ao time</label>
        <input id="team-pokemon-search" type="search" placeholder="Nome, # ou número">
        <div id="team-pokemon-suggestions" class="suggestions" role="listbox"></div>
        <p id="team-message" class="team-message" aria-live="polite"></p>
      </div>

      <div class="team-actions">
        <button id="team-add-current-button" type="button">Adicionar Pokémon atual</button>
        <button id="team-clear-button" class="danger-button" type="button">Limpar time</button>
      </div>

      <section>
        <h3>Pokémon do Time</h3>
        <div id="team-pokemon-list" class="team-pokemon-list"></div>
      </section>

      <section>
        <h3>Fraquezas do Time</h3>
        <div id="team-defense-analysis" class="team-analysis"></div>
      </section>

      <section>
        <h3>Cobertura do Time</h3>
        <p class="analysis-note">Análise simples baseada apenas nos tipos dos Pokémon, não nos ataques.</p>
        <div id="team-offense-analysis" class="team-analysis"></div>
      </section>
    </div>
  </aside>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
